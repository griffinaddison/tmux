# set -g prefix C-b
# unbind C-b
# bind C-b send-prefix

# Set Ctrl-a as an additional prefix
set -g prefix C-a
bind C-a send-prefix

# Keep the original Ctrl-b prefix
set -g prefix2 C-b
bind C-b send-prefix

set -g default-terminal "xterm-kitty"

bind % run-shell "~/.config/tmux/smart-split.sh -h"
bind '"' run-shell "~/.config/tmux/smart-split.sh -v"


setw -g mode-keys vi

set -g mouse on

# https://github.com/kovidgoyal/kitty/issues/5227#issuecomment-1610322523
set -g allow-passthrough on
set -g visual-activity off

# trying to make it possible to yank from ssh > tmux > nvim to local clipboard
# https://github.com/ojroques/vim-oscyank
set -s set-clipboard on

# eliminate nvim esc delay on tmux (might be a macos thing)
set -sg escape-time 0 
set -g status-interval 5

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

set-option -g focus-events on

set -g status-style 'fg=green bg=colour235'
set-option -g status-right "%m-%d-%y"
setw -g window-status-current-style 'fg=colour16 bg=colour46'
setw -g window-status-current-format ' #I #W '

setw -g window-status-style 'fg=lightgrey bg=colour235'
setw -g window-status-format ' #I #[fg=white]#W '

# Dim inactive panes (disabled — only dims default-colored text, not ANSI colors)
# set -g window-active-style 'fg=terminal,bg=terminal'
# set -g window-style 'fg=colour240,bg=terminal'

# Pane border styling
set -g pane-border-lines number
set -g pane-active-border-style 'fg=colour46'
set -g pane-border-style 'fg=colour238'
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#{?#{m:ssh,#{pane_current_command}},#[bold#,fg=black#,bg=colour226],#[fg=colour16#,bg=colour46]},#{?#{m:ssh,#{pane_current_command}},#[fg=black#,bg=colour58],#[fg=black#,bg=colour22]}} #{pane_title} #[default]'

# Set per-pane border colors based on ssh status
set-hook -g after-select-pane 'if-shell "[ \"#{pane_current_command}\" = \"ssh\" ]" "set pane-active-border-style fg=colour226" "set pane-active-border-style fg=colour46"'
set-hook -ga after-select-pane 'run-shell "~/.config/tmux/pane-border-colors.sh"'

# swap v and space in copy mode (so that v is character-wise selection, and space toggle rectangular selection vs normal)
unbind-key -T copy-mode-vi v
unbind-key -T copy-mode-vi Space
bind-key -T copy-mode-vi v send-keys -X begin-selection    # 'v' now starts character selection
bind-key -T copy-mode-vi Space send-keys -X rectangle-toggle # 'Space' now toggles rectangle mode

# Yank selection to tmux buffer + local clipboard via OSC 52 (no external tools needed)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel

# Incremental search in copy mode (highlights matches as you type)
bind-key -T copy-mode-vi / command-prompt -i -I "#{pane_search_string}" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -I "#{pane_search_string}" "send -X search-backward-incremental \"%%%\""

# Drag windows on the status bar
bind-key -n MouseDrag1Status swap-window -d -t=
# make window numbers always consecutive
set-option -g renumber-windows on

# Switch between tmux windows
bind -n C-M-h previous-window
bind -n C-M-l next-window

# Create splits with hjkl (smart split preserves SSH sessions like VSCode)
bind h run-shell "~/.config/tmux/smart-split.sh -hb"  # split left
bind j run-shell "~/.config/tmux/smart-split.sh -v"   # split down
bind k run-shell "~/.config/tmux/smart-split.sh -vb"  # split up
bind l run-shell "~/.config/tmux/smart-split.sh -h"   # split right

# Window/session navigation
bind n next-window
bind p previous-window
bind N switch-client -n
bind P switch-client -p

# Switch tmux sessions with Ctrl+Alt+J/K
bind -n C-M-j switch-client -n   # Next session
bind -n C-M-k switch-client -p   # Previous session

bind-key -n C-n if-shell "[ '#{window_index}' = '0' ]" 'last-window' 'select-window -t 0'

# Last window
bind \; last-window

## Tmux plugin manager

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
## tmux-ressurect, to save sessions manually
set -g @plugin 'tmux-plugins/tmux-resurrect'
## tmux-continuum, to save sessions automatically
set -g @plugin 'tmux-plugins/tmux-continuum'
# smart-splits.nvim tmux plugin disabled — ctrl-window-wrap.tmux handles
# C-hjkl navigation with window wrapping and vim detection
# set -g @plugin 'mrjones2014/smart-splits.nvim'
# set -g @plugin 'tmux-plugins/tmux-yank'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes '"~claude"'
set -g @resurrect-hook-post-save-layout '~/.config/tmux/cc-resurrect-save.sh'




bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5



# Custom ctrl+hjkl navigation with window wrapping
source-file ~/.config/tmux/ctrl-window-wrap.tmux

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
